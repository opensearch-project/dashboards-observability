# CI-only docker-compose for Cortex + Alertmanager.
# Started from the cypress-slo-cortex.yml workflow after actions/checkout.
# OpenSearch and OSD run runner-side (matching the existing apm_test pattern in
# integration-tests-workflow.yml); only the Prometheus-compatible backend lives
# in this stack.
#
# Topology:
#   cortex      :9090  single-binary mode, filesystem ruler storage, in-mem rings
#   alertmanager:9093  minimal null-receiver — Cortex ruler needs a healthy AM
#                      target so it doesn't fail on alert delivery
#
# Image tags pinned to observability-stack/.env exactly:
#   cortexproject/cortex:v1.18.1
#   prom/alertmanager:v0.27.0
#
# Why no data-prepper / OTLP pipeline: the SLO Cypress specs assert on rule
# names, dedup pills, and ruler API behaviour — none query metric VALUES, so
# RED-metric ingestion is unnecessary. Keeping the stack lean (~5s boot)
# avoids the brittleness of running data-prepper against a runner-side OS via
# host.docker.internal (sink init loops blocked the OTLP listener cleanly
# coming up in the first run; see PR description for context).
#
# Deviation from observability-stack/docker-compose.yml: memory limits,
# restart policies, named volumes, the shared bridge network, and the
# entrypoint shim that handles vanilla-Prometheus → Cortex volume migration
# are dropped: ephemeral CI containers, single test run, no reuse.

services:
  cortex:
    image: cortexproject/cortex:v1.18.1
    command: ['-config.file=/etc/cortex/cortex.yaml']
    volumes:
      - ./cortex.yaml:/etc/cortex/cortex.yaml:ro
    ports:
      - '9090:9090'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9090/ready 2>/dev/null | grep -q ready || exit 1']
      interval: 5s
      timeout: 3s
      retries: 24

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command: ['--config.file=/etc/alertmanager/alertmanager.yml']
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - '9093:9093'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9093/-/ready 2>/dev/null || exit 1']
      interval: 5s
      timeout: 3s
      retries: 24
